<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>認証一覧 | iimono award</title>

<style>
body{
  font-family:"Noto Sans JP",sans-serif;
  background:#f7f5f1;
  color:#2c2c2c;
  margin:0;
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:60px 20px;
}

h1{
  text-align:center;
  margin-bottom:40px;
  color:#1a2e44;
}

.filters{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:40px;
}

.filters select,
.filters input{
  padding:10px 14px;
  border:1px solid #ddd;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:28px;
}

.card{
  background:#fff;
  border:1px solid #ddd;
  padding:20px;
  text-align:center;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.name{
  font-size:1.3rem;
  margin:12px 0;
}

.meta{
  color:#777;
  font-size:.9rem;
}
</style>

</head>
<body>

<div class="container">

<h1>認証一覧</h1>

<!-- 検索 -->
<div class="filters">

<input type="text" id="keyword" placeholder="キーワード検索">

<select id="category">
  <option value="">カテゴリーすべて</option>

  <optgroup label="洋菓子">
    <option value="ケーキ">ケーキ</option>
    <option value="パイ">パイ</option>
    <option value="プリン">プリン</option>
    <option value="ゼリー">ゼリー</option>
    <option value="チョコレート">チョコレート</option>
    <option value="バームクーヘン">バームクーヘン</option>
    <option value="焼き菓子">焼き菓子</option>
    <option value="サンド系焼き菓子">サンド系焼き菓子</option>
    <option value="フルーツサンド">フルーツサンド</option>
    <option value="カステラ">カステラ</option>
    <option value="スイートポテト">スイートポテト</option>
    <option value="その他洋菓子">その他洋菓子</option>
  </optgroup>

  <optgroup label="和菓子">
    <option value="最中">最中</option>
    <option value="ようかん">ようかん</option>
    <option value="練り切り">練り切り</option>
    <option value="大福">大福</option>
    <option value="団子">団子</option>
    <option value="餅菓子">餅菓子</option>
    <option value="どら焼き">どら焼き</option>
    <option value="らくがん">らくがん</option>
    <option value="飴菓子">飴菓子</option>
    <option value="その他和菓子">その他和菓子</option>
  </optgroup>
</select>

<select id="area">
  <option value="">地域すべて</option>

  <optgroup label="北海道・東北">
    <option value="北海道">北海道</option>
    <option value="青森">青森</option>
    <option value="岩手">岩手</option>
    <option value="宮城">宮城</option>
    <option value="秋田">秋田</option>
    <option value="山形">山形</option>
    <option value="福島">福島</option>
  </optgroup>

  <optgroup label="関東">
    <option value="東京">東京</option>
    <option value="神奈川">神奈川</option>
    <option value="千葉">千葉</option>
    <option value="埼玉">埼玉</option>
    <option value="茨城">茨城</option>
    <option value="栃木">栃木</option>
    <option value="群馬">群馬</option>
  </optgroup>

  <optgroup label="中部">
    <option value="新潟">新潟</option>
    <option value="富山">富山</option>
    <option value="石川">石川</option>
    <option value="福井">福井</option>
    <option value="山梨">山梨</option>
    <option value="長野">長野</option>
    <option value="岐阜">岐阜</option>
    <option value="静岡">静岡</option>
    <option value="愛知">愛知</option>
  </optgroup>

  <optgroup label="関西">
    <option value="大阪">大阪</option>
    <option value="兵庫">兵庫</option>
    <option value="京都">京都</option>
    <option value="滋賀">滋賀</option>
    <option value="奈良">奈良</option>
    <option value="和歌山">和歌山</option>
    <option value="三重">三重</option>
  </optgroup>

  <optgroup label="中国・四国">
    <option value="鳥取">鳥取</option>
    <option value="島根">島根</option>
    <option value="岡山">岡山</option>
    <option value="広島">広島</option>
    <option value="山口">山口</option>
    <option value="徳島">徳島</option>
    <option value="香川">香川</option>
    <option value="愛媛">愛媛</option>
    <option value="高知">高知</option>
  </optgroup>

  <optgroup label="九州・沖縄">
    <option value="福岡">福岡</option>
    <option value="佐賀">佐賀</option>
    <option value="長崎">長崎</option>
    <option value="熊本">熊本</option>
    <option value="大分">大分</option>
    <option value="宮崎">宮崎</option>
    <option value="鹿児島">鹿児島</option>
    <option value="沖縄">沖縄</option>
  </optgroup>
</select>

</div>

<!-- 商品一覧 -->
<div class="grid" id="list">

<a href="ring.html" class="card" data-category="焼き菓子" data-area="兵庫">
  <img src="../images/ring-main.png" alt="和三盆リングサブレ">
  <div class="name">和三盆リングサブレ</div>
  <div class="meta">兵庫 / 焼き菓子</div>
</a>

<a href="shucream.html" class="card" data-category="ケーキ" data-area="兵庫">
  <img src="../images/shu-main.jpg" alt="シャポーシュー">
  <div class="name">シャポーシュー</div>
  <div class="meta">兵庫 / ケーキ</div>
</a>

</div>

</div>

<script>

const keyword = document.getElementById("keyword");
const category = document.getElementById("category");
const area = document.getElementById("area");
const cards = document.querySelectorAll(".card");

function filter(){
  const k = keyword.value.toLowerCase();
  const c = category.value;
  const a = area.value;

  cards.forEach(card=>{
    const name = card.innerText.toLowerCase();
    const cat = card.dataset.category;
    const ar = card.dataset.area;

    let show = true;

    if(k && !name.includes(k)) show=false;
    if(c && c !== cat) show=false;
    if(a && a !== ar) show=false;

    card.style.display = show ? "block" : "none";
  });
}

keyword.addEventListener("input", filter);
category.addEventListener("change", filter);
area.addEventListener("change", filter);

</script>

</body>
</html>
