<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">

<title>ニュース一覧 | iimono award</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f7f5f1;
  color:#2c2c2c;
  font-family:"Noto Sans JP",sans-serif;
  letter-spacing:.03em;
}

.news-page{
  max-width:1080px;
  margin:0 auto;
  padding:90px 24px;
}

.back-link{
  display:inline-block;
  margin-bottom:56px;
  color:#1a2e44;
  text-decoration:none;
  font-size:.95rem;
}

.page-label{
  color:#9b7e57;
  letter-spacing:.22em;
  font-size:.82rem;
  text-align:center;
  margin-bottom:16px;
}

h1{
  font-family:"Noto Serif JP",serif;
  color:#1a2e44;
  text-align:center;
  font-size:clamp(2.2rem,4vw,3.4rem);
  margin:0 0 18px;
  letter-spacing:.06em;
}

.page-lead{
  text-align:center;
  color:#666;
  line-height:2;
  margin-bottom:70px;
}

.news-list{
  border-top:1px solid #ddd5c8;
}

.news-item{
  display:block;
  padding:42px 0;
  border-bottom:1px solid #ddd5c8;
  text-decoration:none;
  color:inherit;
  transition:.25s;
}

.news-item:hover{
  opacity:.75;
}

.news-meta{
  display:flex;
  align-items:center;
  gap:18px;
  margin-bottom:22px;
  flex-wrap:wrap;
}

.news-date{
  color:#9b7e57;
  letter-spacing:.12em;
  font-size:.92rem;
}

.news-tag{
  background:#e9e6e1;
  color:#1a2e44;
  padding:7px 15px;
  font-size:.82rem;
  font-weight:600;
  letter-spacing:.08em;
}

.news-title{
  font-family:"Noto Serif JP",serif;
  color:#1a2e44;
  font-size:clamp(1.45rem,2.4vw,2rem);
  line-height:1.6;
  margin:0 0 18px;
  letter-spacing:.04em;
}

.news-excerpt{
  color:#666;
  line-height:2;
  margin:0;
}

.btn-area{
  text-align:center;
  margin-top:70px;
}

.btn{
  display:inline-block;
  padding:15px 34px;
  border:1px solid #1a2e44;
  color:#1a2e44;
  text-decoration:none;
  letter-spacing:.08em;
}

.btn:hover{
  background:#1a2e44;
  color:#fff;
}

@media(max-width:768px){
  .news-page{
    padding:70px 20px;
  }

  .page-lead{
    margin-bottom:48px;
  }

  .news-item{
    padding:34px 0;
  }
}
</style>
</head>

<body>

<main class="news-page">

<a href="../index.html#news" class="back-link">← トップへ戻る</a>

<div class="page-label">NEWS</div>
<h1>ニュース一覧</h1>

<p class="page-lead">
制度の動きと、認証商品の公開情報をお知らせします。
</p>

<div class="news-list">

  <a href="first-award.html" class="news-item">
    <div class="news-meta">
      <time class="news-date">2026.04.25</time>
      <span class="news-tag">認証発表</span>
    </div>

    <h2 class="news-title">
      第1回 iimono award 認証商品を発表いたしました
    </h2>

    <p class="news-excerpt">
      第1回認証審査を実施し、新たな認証商品を決定・公開いたしました。認証一覧ページよりご覧いただけます。
    </p>
  </a>

</div>

<div class="btn-area">
  <a href="../index.html#news" class="btn">トップへ戻る</a>
</div>

</main>

</body>
</html>
